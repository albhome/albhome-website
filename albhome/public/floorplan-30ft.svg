<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" fill="none">
  <rect width="800" height="550" fill="#f7f5ef"/>

  <!-- Title Block -->
  <rect x="20" y="12" width="760" height="40" fill="#283406" rx="4"/>
  <text x="400" y="37" text-anchor="middle" font-family="Oswald, sans-serif" font-size="18" font-weight="bold" fill="#fff" letter-spacing="2">30FT OUTBACK CLASSIC — FLOOR PLAN</text>
  <text x="400" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Approx. 58m² | 2 Bedrooms | 1 Bathroom | 30ft Expandable Home</text>

  <!-- North Arrow -->
  <g transform="translate(730, 75)">
    <polygon points="0,-15 -5,5 0,0 5,5" fill="#8E9E61"/>
    <text x="0" y="-18" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#8E9E61">N</text>
  </g>

  <!-- OUTER WALLS (9.1m x 2.4m) -->
  <rect x="30" y="90" width="740" height="310" stroke="#2a2a2a" stroke-width="4" fill="none"/>
  <rect x="33" y="93" width="734" height="304" stroke="#2a2a2a" stroke-width="1.5" fill="none" stroke-dasharray="2,3"/>

  <!-- ===== INTERIOR WALLS ===== -->

  <!-- Main corridor wall (horizontal divider) -->
  <line x1="30" y1="270" x2="460" y2="270" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="33" y1="273" x2="457" y2="273" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bathroom walls -->
  <line x1="460" y1="270" x2="460" y2="400" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="457" y1="273" x2="457" y2="397" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="460" y1="270" x2="570" y2="270" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="463" y1="273" x2="567" y2="273" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bedroom 2 divider -->
  <line x1="570" y1="270" x2="570" y2="400" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="567" y1="273" x2="567" y2="397" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bedroom 1 divider -->
  <line x1="460" y1="90" x2="460" y2="260" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="457" y1="93" x2="457" y2="257" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bathroom shower wall -->
  <line x1="460" y1="90" x2="460" y2="155" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- ===== DOOR SWINGS ===== -->

  <!-- Front Entry Door -->
  <g transform="translate(200, 385)">
    <rect x="0" y="0" width="36" height="7" fill="#f7f5ef" stroke="#8E9E61" stroke-width="2"/>
    <path d="M0,7 Q-36,7 -36,30" fill="none" stroke="#8E9E61" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="18" y="20" text-anchor="middle" font-family="Arial" font-size="7" fill="#8E9E61">FRONT ENTRY</text>
  </g>

  <!-- Bedroom 1 Door -->
  <g transform="translate(555, 245)">
    <rect x="0" y="0" width="7" height="22" fill="#f7f5ef" stroke="#555" stroke-width="1.5"/>
    <path d="M7,0 Q20,0 20,-20" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Bathroom Door -->
  <g transform="translate(562, 260)">
    <rect x="0" y="0" width="22" height="7" fill="#f7f5ef" stroke="#555" stroke-width="1.5"/>
    <path d="M22,0 Q22,-20 0,-20" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Bedroom 2 Door -->
  <g transform="translate(682, 375)">
    <rect x="0" y="0" width="7" height="22" fill="#f7f5ef" stroke="#555" stroke-width="1.5"/>
    <path d="M7,0 Q18,0 18,-15" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

