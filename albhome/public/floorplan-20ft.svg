<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" fill="none">
  <rect width="800" height="550" fill="#f7f5ef"/>

  <!-- Title Block -->
  <rect x="20" y="12" width="760" height="40" fill="#283406" rx="4"/>
  <text x="400" y="37" text-anchor="middle" font-family="Oswald, sans-serif" font-size="18" font-weight="bold" fill="#fff" letter-spacing="2">20FT STOCKMAN CLASSIC — FLOOR PLAN</text>

  <!-- Subtitle -->
  <text x="400" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Approx. 38m² | 1 Bedroom | 1 Bathroom | 20ft Expandable Home</text>

  <!-- North Arrow -->
  <g transform="translate(730, 75)">
    <polygon points="0,-15 -5,5 0,0 5,5" fill="#8E9E61"/>
    <text x="0" y="-18" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#8E9E61">N</text>
  </g>

  <!-- OUTER WALLS (6.0m x 2.4m) -->
  <rect x="50" y="90" width="680" height="310" stroke="#2a2a2a" stroke-width="4" fill="none"/>
  <!-- Inner wall line for thickness -->
  <rect x="53" y="93" width="674" height="304" stroke="#2a2a2a" stroke-width="1.5" fill="none" stroke-dasharray="2,3"/>

  <!-- ===== INTERIOR WALLS ===== -->

  <!-- Bedroom partition wall (horizontal) -->
  <line x1="50" y1="270" x2="420" y2="270" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="53" y1="273" x2="417" y2="273" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bathroom vertical divider -->
  <line x1="420" y1="270" x2="420" y2="400" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="417" y1="273" x2="417" y2="397" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bathroom / bedroom divider horizontal -->
  <line x1="420" y1="270" x2="550" y2="270" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="423" y1="273" x2="547" y2="273" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bathroom shower stall wall -->
  <line x1="420" y1="100" x2="420" y2="180" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- ===== DOOR SWINGS ===== -->

  <!-- Front Entry Door -->
  <g transform="translate(170, 385)">
    <rect x="0" y="0" width="36" height="7" fill="#f7f5ef" stroke="#8E9E61" stroke-width="2"/>
    <path d="M0,7 Q-36,7 -36,30" fill="none" stroke="#8E9E61" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="18" y="20" text-anchor="middle" font-family="Arial" font-size="7" fill="#8E9E61">FRONT ENTRY</text>
  </g>

  <!-- Bedroom Door -->
  <g transform="translate(555, 348)">
    <rect x="0" y="0" width="7" height="25" fill="#f7f5ef" stroke="#555" stroke-width="1.5"/>
    <path d="M7,0 Q20,0 20,-20" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Bathroom Door -->
  <g transform="translate(542, 260)">
    <rect x="0" y="0" width="22" height="7" fill="#f7f5ef" stroke="#555" stroke-width="1.5"/>
    <path d="M22,0 Q22,-20 0,-20" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Shower Door -->
  <line x1="420" y1="110" x2="460" y2="110" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== WINDOWS ===== -->

  <!-- Living room window (large) -->
  <g>
    <rect x="48" y="125" width="8" height="70" fill="#c8dde8" stroke="#8E9E61" stroke-width="1.5"/>
    <line x1="52" y1="125" x2="52" y2="195" stroke="#8E9E61" stroke-width="0.5"/>
    <line x1="54" y1="125" x2="54" y2="195" stroke="#8E9E61" stroke-width="0.5"/>
    <rect x="45" y="135" width="3" height="50" fill="#8E9E61" opacity="0.3"/>
    <rect x="56" y="135" width="3" height="50" fill="#8E9E61" opacity="0.3"/>
  </g>

  <!-- Bedroom window -->
  <g>
    <rect x="722" y="300" width="8" height="50" fill="#c8dde8" stroke="#8E9E61" stroke-width="1.5"/>
    <line x1="726" y1="300" x2="726" y2="350" stroke="#8E9E61" stroke-width="0.5"/>
    <line x1="728" y1="300" x2="728" y2="350" stroke="#8E9E61" stroke-width="0.5"/>
  </g>

  <!-- Bathroom window -->
  <g>
    <rect x="650" y="88" width="60" height="8" fill="#c8dde8" stroke="#8E9E61" stroke-width="1.5"/>
    <line x1="650" y1="92" x2="710" y2="92" stroke="#8E9E61" stroke-width="0.5"/>
    <line x1="650" y1="94" x2="710" y2="94" stroke="#8E9E61" stroke-width="0.5"/>
  </g>

  <!-- ===== OPEN PLAN LIVING (Top-Left) ===== -->
  <rect x="58" y="98" width="350" height="160" fill="#f5f3ea" rx="2"/>

  <!-- Living Area Label -->
  <text x="230" y="132" text-anchor="middle" font-family="Oswald, sans-serif" font-size="13" font-weight="bold" fill="#283406" letter-spacing="1">OPEN PLAN LIVING</text>
  <text x="230" y="148" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Living · Dining · Kitchen</text>

  <!-- Living Area --->
  <rect x="60" y="165" width="160" height="85" fill="#f0ede0" rx="3"/>

  <!-- Sofa (L-shaped) -->
  <rect x="68" y="180" width="80" height="32" fill="#8E9E61" rx="4"/>
  <rect x="68" y="180" width="20" height="60" fill="#8E9E61" rx="4"/>
  <rect x="68" y="195" width="80" height="4" fill="#6B7C42" rx="1"/>
  <!-- Cushion lines -->
  <line x1="80" y1="183" x2="80" y2="209" stroke="#6B7C42" stroke-width="0.5"/>
  <line x1="95" y1="183" x2="95" y2="209" stroke="#6B7C42" stroke-width="0.5"/>
  <line x1="110" y1="183" x2="110" y2="209" stroke="#6B7C42" stroke-width="0.5"/>

  <!-- Coffee Table -->
  <rect x="160" y="200" width="45" height="28" fill="#d4c9a8" rx="2"/>
  <rect x="162" y="202" width="41" height="24" fill="#e0d6b8" rx="1"/>

  <!-- TV Cabinet -->
  <rect x="60" y="255" width="100" height="6" fill="#444" rx="1"/>
  <rect x="80" y="261" width="60" height="3" fill="#666" rx="1"/>

  <!-- Dining Area -->
  <rect x="235" y="168" width="160" height="80" fill="#f0ede0" rx="3"/>
  <text x="315" y="188" text-anchor="middle" font-family="Oswald, sans-serif" font-size="10" font-weight="bold" fill="#283406">DINING</text>

  <!-- Dining Table -->
  <rect x="275" y="200" width="80" height="36" fill="#c4b896" rx="2"/>
  <rect x="277" y="202" width="76" height="32" fill="#d4c9a8" rx="1"/>

  <!-- Dining Chairs -->
  <rect x="278" y="192" width="20" height="8" fill="#666" rx="1"/>
  <rect x="310" y="192" width="20" height="8" fill="#666" rx="1"/>
  <rect x="340" y="192" width="20" height="8" fill="#666" rx="1"/>
  <rect x="278" y="236" width="20" height="8" fill="#666" rx="1"/>
  <rect x="310" y="236" width="20" height="8" fill="#666" rx="1"/>
  <rect x="340" y="236" width="20" height="8" fill="#666" rx="1"/>

  <!-- Kitchen Area -->
  <rect x="60" y="98" width="180" height="60" fill="#e8f0e0" rx="2"/>

  <!-- Kitchen Counter -->
  <rect x="60" y="98" width="180" height="8" fill="#8E9E61" rx="1"/>
  <rect x="60" y="106" width="180" height="45" fill="#d4ddc4" rx="1"/>

  <!-- Stove / Cooktop -->
  <rect x="70" y="110" width="30" height="18" fill="#555" rx="2"/>
  <circle cx="78" cy="115" r="3" fill="#888"/>
  <circle cx="93" cy="115" r="3" fill="#888"/>
  <circle cx="78" cy="125" r="3" fill="#888"/>
  <circle cx="93" cy="125" r="3" fill="#888"/>

  <!-- Sink -->
  <rect x="115" y="112" width="28" height="14" fill="#ccc" rx="3"/>
  <rect x="118" y="114" width="22" height="10" fill="#bbb" rx="2"/>

  <!-- Fridge -->
  <rect x="160" y="106" width="22" height="30" fill="#ddd" rx="1"/>
  <line x1="171" y1="106" x2="171" y2="136" stroke="#ccc" stroke-width="0.5"/>

  <!-- Kitchen label -->
  <text x="100" y="156" text-anchor="middle" font-family="Oswald, sans-serif" font-size="10" font-weight="bold" fill="#283406">KITCHEN</text>

  <!-- ===== BATHROOM (Top-Right) ===== -->
  <rect x="428" y="98" width="292" height="160" fill="#e8f0e8" rx="2"/>
  <text x="575" y="118" text-anchor="middle" font-family="Oswald, sans-serif" font-size="13" font-weight="bold" fill="#283406" letter-spacing="1">BATHROOM</text>

  <!-- Shower Stall -->
  <rect x="428" y="130" width="50" height="50" fill="#d4e4d4" rx="2"/>
  <text x="453" y="145" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">SHOWER</text>
  <!-- Shower head -->
  <circle cx="453" cy="136" r="4" fill="none" stroke="#999" stroke-width="1"/>
  <circle cx="453" cy="136" r="1.5" fill="#999"/>
  <!-- Drain -->
  <circle cx="453" cy="164" r="3" fill="none" stroke="#999" stroke-width="0.5"/>

  <!-- Toilet -->
  <circle cx="690" cy="190" r="12" fill="none" stroke="#888" stroke-width="2"/>
  <rect x="682" y="178" width="16" height="10" fill="#ddd" rx="3"/>
  <!-- Seat -->
  <ellipse cx="690" cy="190" rx="8" ry="10" fill="none" stroke="#bbb" stroke-width="0.5"/>
  <text x="690" y="215" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">WC</text>

  <!-- Vanity / Sink -->
  <rect x="550" y="230" width="80" height="22" fill="#d4ddc4" rx="3"/>
  <circle cx="565" cy="241" r="4" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <circle cx="580" cy="241" r="4" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <rect x="592" y="238" width="8" height="6" fill="#bbb" rx="1"/>
  <text x="590" y="248" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">VANITY</text>

  <!-- Mirror -->
  <rect x="558" y="220" width="64" height="8" fill="#b8d4e8" rx="1" opacity="0.6"/>

  <!-- Towel rack -->
  <line x1="650" y1="128" x2="680" y2="128" stroke="#999" stroke-width="1.5"/>
  <rect x="652" y="123" width="3" height="5" fill="#8E9E61" rx="0.5"/>
  <rect x="665" y="123" width="3" height="5" fill="#8E9E61" rx="0.5"/>

  <!-- ===== BEDROOM (Bottom-Left) ===== -->
  <rect x="58" y="278" width="350" height="112" fill="#e6edf5" rx="2"/>
  <text x="230" y="300" text-anchor="middle" font-family="Oswald, sans-serif" font-size="13" font-weight="bold" fill="#283406" letter-spacing="1">BEDROOM 1</text>
  <text x="230" y="316" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">4.0m × 3.2m (12.8m²)</text>

  <!-- Queen Bed -->
  <rect x="155" y="325" width="60" height="55" fill="#d0dce8" rx="3"/>
  <!-- Headboard -->
  <rect x="155" y="325" width="60" height="8" fill="#8E9E61" rx="2"/>
  <!-- Pillows -->
  <rect x="162" y="330" width="20" height="12" fill="#fff" rx="2" opacity="0.7"/>
  <rect x="188" y="330" width="20" height="12" fill="#fff" rx="2" opacity="0.7"/>
  <!-- Bed cover -->
  <rect x="162" y="345" width="46" height="28" fill="#b0c4d8" rx="1" opacity="0.5"/>
  <text x="186" y="365" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">QUEEN</text>

  <!-- Bedside Tables -->
  <rect x="140" y="335" width="12" height="14" fill="#c4b896" rx="1"/>
  <rect x="218" y="335" width="12" height="14" fill="#c4b896" rx="1"/>

  <!-- Wardrobe -->
  <rect x="60" y="325" width="70" height="55" fill="#e0e0d8" rx="2"/>
  <line x1="60" y1="340" x2="130" y2="340" stroke="#ccc" stroke-width="0.5"/>
  <line x1="60" y1="358" x2="130" y2="358" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="95" cy="349" r="1.5" fill="#999"/>
  <circle cx="95" cy="367" r="1.5" fill="#999"/>
  <text x="95" y="377" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">WARDROBE</text>

  <!-- ===== ENTRANCE HALL (Bottom-Right) ===== -->
  <rect x="428" y="278" width="110" height="112" fill="#f5f3ea" rx="2"/>

  <!-- Hallway / Foyer area -->
  <text x="480" y="330" text-anchor="middle" font-family="Oswald, sans-serif" font-size="10" font-weight="bold" fill="#283406">ENTRY</text>
  <text x="480" y="348" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">HALL</text>

  <!-- Coat hook -->
  <rect x="470" y="295" width="3" height="10" fill="#666" rx="1"/>
  <circle cx="471.5" cy="295" r="2" fill="#666"/>

  <!-- ===== STUDY / UTILITY (Bottom-Right corner) ===== -->
  <rect x="550" y="278" width="170" height="112" fill="#f5f3ea" rx="2"/>
  <text x="635" y="330" text-anchor="middle" font-family="Oswald, sans-serif" font-size="11" font-weight="bold" fill="#283406">STUDY / UTILITY</text>
  <text x="635" y="348" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">2.8m × 2.4m</text>

  <!-- Work desk -->
  <rect x="640" y="295" width="65" height="24" fill="#c4b896" rx="2"/>
  <rect x="640" y="295" width="65" height="4" fill="#8E9E61" rx="1"/>
  <text x="673" y="311" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">DESK</text>

  <!-- Shelving -->
  <rect x="558" y="288" width="55" height="4" fill="#888" rx="0.5"/>
  <rect x="558" y="296" width="55" height="4" fill="#888" rx="0.5"/>
  <rect x="558" y="304" width="55" height="4" fill="#888" rx="0.5"/>
  <rect x="558" y="312" width="55" height="4" fill="#888" rx="0.5"/>
  <text x="585" y="326" text-anchor="middle" font-family="Arial" font-size="6" fill="#555">SHELVES</text>

  <!-- Chair -->
  <rect x="648" y="325" width="20" height="20" fill="#8E9E61" rx="2" opacity="0.6"/>
  <text x="658" y="338" text-anchor="middle" font-family="Arial" font-size="5" fill="#fff">CHAIR</text>

  <!-- ===== DIMENSION LINES ===== -->

  <!-- Top dimension -->
  <line x1="50" y1="80" x2="730" y2="80" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3"/>
  <line x1="50" y1="76" x2="50" y2="84" stroke="#aaa" stroke-width="1"/>
  <line x1="730" y1="76" x2="730" y2="84" stroke="#aaa" stroke-width="1"/>
  <text x="390" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">6.0m (20ft)</text>

  <!-- Left dimension -->
  <line x1="40" y1="90" x2="40" y2="400" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3"/>
  <line x1="36" y1="90" x2="44" y2="90" stroke="#aaa" stroke-width="1"/>
  <line x1="36" y1="400" x2="44" y2="400" stroke="#aaa" stroke-width="1"/>
  <text x="36" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#888" transform="rotate(-90, 36, 248)">2.4m</text>

  <!-- ===== ROOM AREA LABELS ===== -->
  <rect x="58" y="270" width="80" height="3" fill="#283406" opacity="0.3"/>
  <rect x="426" y="270" width="80" height="3" fill="#283406" opacity="0.3"/>

  <!-- ===== SCALE BAR ===== -->
  <g transform="translate(620, 420)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#666" stroke-width="2"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#666" stroke-width="1.5"/>
    <line x1="30" y1="-5" x2="30" y2="5" stroke="#666" stroke-width="1.5"/>
    <line x1="60" y1="-5" x2="60" y2="5" stroke="#666" stroke-width="1.5"/>
    <rect x="0" y="-2" width="15" height="4" fill="#666"/>
    <rect x="30" y="-2" width="15" height="4" fill="#fff"/>
    <rect x="15" y="-2" width="15" height="4" fill="#fff"/>
    <rect x="45" y="-2" width="15" height="4" fill="#666"/>
    <text x="0" y="14" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">0</text>
    <text x="30" y="14" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">0.5m</text>
    <text x="60" y="14" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">1.0m</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(50, 420)">
    <text x="0" y="0" font-family="Oswald, sans-serif" font-size="11" font-weight="bold" fill="#283406">LEGEND</text>
    <rect x="0" y="8" width="16" height="6" fill="#c8dde8" stroke="#8E9E61" stroke-width="0.5"/>
    <text x="20" y="14" font-family="Arial" font-size="8" fill="#666">Window</text>
    <rect x="95" y="8" width="12" height="4" fill="#f7f5ef" stroke="#555" stroke-width="0.8"/>
    <path d="M107,10 Q117,10 117,18" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="2,1"/>
    <text x="120" y="14" font-family="Arial" font-size="8" fill="#666">Door Swing</text>
    <rect x="0" y="18" width="16" height="6" fill="#8E9E61" rx="1"/>
    <text x="20" y="24" font-family="Arial" font-size="8" fill="#666">Furniture</text>
  </g>

  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#999">This floor plan is indicative only. All measurements are approximate and subject to variation.</text>
</svg>