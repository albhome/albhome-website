    <line x1="17" y1="140" x2="17" y2="225" stroke="#8E9E61" stroke-width="0.5"/>
    <line x1="19" y1="140" x2="19" y2="225" stroke="#8E9E61" stroke-width="0.5"/>
    <rect x="10" y="155" width="3" height="55" fill="#8E9E61" opacity="0.3"/>
