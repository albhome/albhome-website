  <line x1="402" y1="283" x2="402" y2="397" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="405" y1="280" x2="520" y2="280" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="408" y1="283" x2="517" y2="283" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bedroom 3 divider -->
  <line x1="520" y1="280" x2="520" y2="400" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="517" y1="283" x2="517" y2="397" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Bedroom 2 divider -->
