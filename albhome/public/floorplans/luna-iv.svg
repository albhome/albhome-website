  <rect class="furniture" x="760" y="220" width="80" height="18" rx="2"/>
  <rect class="furniture-fill" x="1030" y="200" width="50" height="30" rx="2"/>
  <rect class="furniture-fill" x="860" y="26" width="130" height="28" rx="2"/>
  <rect class="furniture" x="865" y="32" width="20" height="16" rx="2"/>

  <rect x="1030" y="435" width="250" height="130" rx="3" fill="#f0f0f0" stroke="#ddd" stroke-width="0.8"/>
  <text class="dims-title" x="1045" y="450">DIMENSIONS</text>
  <text class="dims-item" x="1045" y="464">Living &amp; Kitchen</text><text class="dims-value" x="1265" y="464">20.2m²</text>
  <text class="dims-item" x="1045" y="478">Bedroom 1</text><text class="dims-value" x="1265" y="478">10.0m²</text>
  <text class="dims-item" x="1045" y="492">Bedroom 2</text><text class="dims-value" x="1265" y="492">7.50m²</text>
  <text class="dims-item" x="1045" y="506">Bedroom 3</text><text class="dims-value" x="1265" y="506">7.50m²</text>
  <text class="dims-item" x="1045" y="520">Bathroom</text><text class="dims-value" x="1265" y="520">3.96m²</text>
  <text class="dims-item" x="1045" y="534" font-weight="600" fill="#1a1a1a">Total</text><text class="dims-value" x="1265" y="534" font-weight="700" fill="#1a1a1a">59.48m²</text>

  <line class="dim-line" x1="20" y1="540" x2="1290" y2="540"/>
  <line class="dim-line" x1="20" y1="536" x2="20" y2="544"/>
  <line class="dim-line" x1="1290" y1="536" x2="1290" y2="544"/>
