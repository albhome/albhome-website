  <!-- North arrow -->
  <g transform="translate(1260, 38)">
    <polygon points="0,-8 3.5,0 -3.5,0" fill="#666"/>
    <text class="dim-label" x="0" y="-10" text-anchor="middle" font-weight="700" font-size="7">N</text>
