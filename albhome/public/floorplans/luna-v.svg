<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 560" width="100%" height="100%">
  <defs>
    <style>

      .bg-w { fill: #ffffff; }
      .wall-ext { fill: none; stroke: #000; stroke-width: 3; stroke-linejoin: round; }
      .wall-int { fill: none; stroke: #000; stroke-width: 2.5; }
      .wall-thin { fill: none; stroke: #666; stroke-width: 1.2; }
      .room-bed { fill: #f0f4f8; }
      .room-living { fill: #f8f6f0; }
      .room-kitchen { fill: #f5f5f0; }
      .room-bath { fill: #f0f8f4; }
      .room-util { fill: #fafafa; }
      .room-label { font-family: system-ui, sans-serif; font-size: 11px; fill: #000; font-weight: 700; text-anchor: middle; }
      .room-label-sm { font-family: system-ui, sans-serif; font-size: 7px; fill: #555; text-anchor: middle; }
      .dim-label { font-family: system-ui, sans-serif; font-size: 7px; fill: #666; text-anchor: middle; }
      .dim-line { stroke: #999; stroke-width: 0.5; stroke-dasharray: 2,2.5; }
      .furniture { fill: none; stroke: #888; stroke-width: 1; }
      .furniture-fill { fill: #e8e8e8; stroke: #888; stroke-width: 0.8; }
      .furniture-stroke { fill: #ddd; stroke: #888; stroke-width: 1; }
      .dims-title { font-family: system-ui, sans-serif; font-size: 8px; fill: #222; font-weight: 700; letter-spacing: 1px; }
      .dims-item { font-family: system-ui, sans-serif; font-size: 7px; fill: #555; }
      .dims-value { font-family: system-ui, sans-serif; font-size: 7px; fill: #000; font-weight: 600; text-anchor: end; }

    </style>
  </defs>
  <rect class="bg-w" x="0" y="0" width="1320" height="560" rx="4"/>

  <text class="dims-title" x="22" y="14">LUNA V — 1 Bed + Large Living</text>
  <text class="dim-label" x="22" y="23">Accessory Dwelling Unit</text>

  <rect class="wall-ext" x="20" y="26" width="1260" height="506" rx="3"/>

  <rect x="22" y="26" width="110" height="506" class="room-util" rx="1"/>
  <text class="room-label" x="77" y="300">LAUNDRY</text>
  <rect x="132" y="26" width="140" height="506" class="room-bath" rx="1"/>
  <text class="room-label" x="202" y="260">BATHROOM</text>
  <rect x="272" y="26" width="240" height="506" class="room-bed" rx="1"/>
  <text class="room-label" x="392" y="260">BEDROOM 1 + WIR</text>
  <rect x="512" y="26" width="746" height="506" class="room-living" rx="1"/>
  <text class="room-label" x="885" y="260">LIVING &amp; KITCHEN</text>

  <line class="wall-int" x1="132" y1="26" x2="132" y2="532"/>
  <line class="wall-int" x1="272" y1="26" x2="272" y2="532"/>
  <line class="wall-int" x1="512" y1="26" x2="512" y2="532"/>

  <rect class="furniture-fill" x="35" y="50" width="38" height="30" rx="3"/>
  <rect class="furniture-fill" x="35" y="85" width="38" height="30" rx="3"/>
  <circle cx="44" cy="65" r="3" fill="#ccc"/>
  <circle cx="44" cy="100" r="3" fill="#ccc"/>
  <rect class="furniture" x="150" y="55" width="45" height="45" rx="3"/>
  <circle cx="172.5" cy="77.5" r="10" fill="#ddd"/>
  <rect class="furniture" x="220" y="140" width="22" height="25" rx="2"/>
  <circle cx="231" cy="157" r="6" fill="#ddd"/>
  <rect class="furniture-fill" x="150" y="150" width="35" height="22" rx="2"/>
  <rect class="furniture-fill" x="310" y="65" width="85" height="55" rx="3"/>
  <rect class="furniture" x="310" y="65" width="85" height="18" rx="2"/>
  <rect class="furniture-fill" x="305" y="55" width="12" height="12" rx="2"/>
  <rect class="furniture-fill" x="388" y="55" width="12" height="12" rx="2"/>
  <rect class="furniture" x="345" y="83" width="8" height="8" rx="4"/>
  <rect class="furniture" x="295" y="240" width="10" height="120" rx="1"/>
  <rect class="furniture" x="480" y="240" width="10" height="120" rx="1"/>
  <rect class="furniture-fill" x="530" y="26" width="240" height="40" rx="2"/>
  <circle cx="560" cy="46" r="4.5" fill="#ccc"/>
  <circle cx="585" cy="46" r="4.5" fill="#ccc"/>
  <circle cx="610" cy="46" r="4.5" fill="#ccc"/>
  <rect class="furniture-fill" x="750" y="200" width="85" height="50" rx="5"/>
  <rect class="furniture-fill" x="1000" y="350" width="140" height="40" rx="4"/>
  <rect class="furniture-fill" x="600" y="300" width="70" height="90" rx="3"/>

  <rect x="1030" y="435" width="250" height="130" rx="3" fill="#f0f0f0" stroke="#ddd" stroke-width="0.8"/>
  <text class="dims-title" x="1045" y="450">DIMENSIONS</text>
  <text class="dims-item" x="1045" y="464">Living &amp; Kitchen</text><text class="dims-value" x="1265" y="464">22.5m²</text>
  <text class="dims-item" x="1045" y="478">Bedroom 1 + WIR</text><text class="dims-value" x="1265" y="478">11.1m²</text>
  <text class="dims-item" x="1045" y="492">Walk-in Robe</text><text class="dims-value" x="1265" y="492">2.16m²</text>
  <text class="dims-item" x="1045" y="506">Bathroom</text><text class="dims-value" x="1265" y="506">3.96m²</text>
  <text class="dims-item" x="1045" y="520">Laundry</text><text class="dims-value" x="1265" y="520">1.92m²</text>
  <text class="dims-item" x="1045" y="534" font-weight="600" fill="#1a1a1a">Total</text><text class="dims-value" x="1265" y="534" font-weight="700" fill="#1a1a1a">59.44m²</text>

  <line class="dim-line" x1="20" y1="540" x2="1290" y2="540"/>
  <line class="dim-line" x1="20" y1="536" x2="20" y2="544"/>
  <line class="dim-line" x1="1290" y1="536" x2="1290" y2="544"/>
  <text class="dim-label" x="660" y="552">12,600mm</text>

  <line class="dim-line" x1="1300" y1="26" x2="1300" y2="532"/>
  <line class="dim-line" x1="1296" y1="26" x2="1304" y2="26"/>
  <line class="dim-line" x1="1296" y1="532" x2="1304" y2="532"/>
  <text class="dim-label" x="1315" y="279" transform="rotate(90, 1315, 279)">4,910mm</text>

  <!-- Scale bar -->
  <line class="wall-int" x1="30" y1="555" x2="130" y2="555"/>
  <line class="wall-thin" x1="30" y1="552" x2="30" y2="558"/>
  <line class="wall-thin" x1="130" y1="552" x2="130" y2="558"/>
  <text class="dim-label" x="80" y="550">1m</text>

  <!-- North arrow -->
  <g transform="translate(1260, 38)">
    <polygon points="0,-8 3.5,0 -3.5,0" fill="#666"/>
    <text class="dim-label" x="0" y="-10" text-anchor="middle" font-weight="700" font-size="7">N</text>
  </g>
</svg>